<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Slide Whiteboard</title>
  <link rel="stylesheet" href="whiteboard.css" />
</head>
<body>
  <button id="toggleWhiteboard" class="toggle-btn">&lt;|</button>
  <div id="whiteboardPanel" class="whiteboard hidden">
    <div class="whiteboard-toolbar">
      <button id="penBtn">✏️</button>
      <button id="eraserBtn">🧽</button>
      <select id="colorSelect">
        <option value="black">Black</option>
        <option value="red">Red</option>
        <option value="blue">Blue</option>
        <option value="green">Green</option>
      </select>
      <input type="range" id="sizeSlider" min="2" max="20" value="4" />
      <button id="addPage">➕ Page</button>
      <button id="wbPrevPage">⬅️</button>
      <button id="wbNextPage">➡️</button>
      <button id="closeWhiteboard">❌</button>
      <button id="toggleTheme">🌓</button>
    </div>
    <div id="canvasContainer"></div>
  </div>
  <script src="whiteboard.js"></script>
</body>
</html>
